services:
  # ============================================
  # PostgreSQL 16
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: itm-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: itm
      POSTGRES_PASSWORD: itm_password
      POSTGRES_DB: itm_panel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itm -d itm_panel"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - itm-network

  # ============================================
  # API Express (hot reload avec tsx watch)
  # ============================================
  api:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    container_name: itm-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://itm:itm_password@postgres:5432/itm_panel"
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      PUBLIC_API_KEY: ${PUBLIC_API_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3002}
      APP_URL: ${APP_URL:-http://localhost:3002}
      NODE_ENV: development
      HOST: "0.0.0.0"
      PORT: "3001"
      UPLOADS_DIR: "/app/uploads"
      MAX_UPLOAD_SIZE_MB: "10"
    volumes:
      - ./server:/app/server:delegated
      - ./prisma:/app/prisma:delegated
      - ./uploads:/app/uploads
      - ./package.json:/app/package.json:ro
      - ./bun.lock:/app/bun.lock:ro
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - itm-network

volumes:
  pgdata:
    driver: local

networks:
  itm-network:
    driver: bridge
