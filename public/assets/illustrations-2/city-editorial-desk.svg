<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none" role="img" aria-labelledby="t">
  <title id="t">Bureau éditorial panoramique</title>
  <defs>
    <linearGradient id="gPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#EEF2F5"/>
    </linearGradient>
    <linearGradient id="gInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2030"/>
      <stop offset="100%" stop-color="#1D141F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="640" height="480" rx="32"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="640" height="480" fill="url(#gPaper)"/>
    <circle cx="560" cy="-20" r="160" fill="#E2F343" fill-opacity="0.18"/>
    <circle cx="40" cy="460" r="140" fill="#1D141F" fill-opacity="0.07"/>
    <path d="M0 360c80-40 160-20 240 10s160 40 240-10 120-50 160-20v140H0V360Z" fill="#E8ECEF" fill-opacity="0.35"/>

    <!-- desk plane -->
    <path d="M40 340h560l-40 80H80L40 340Z" fill="#1D141F" fill-opacity="0.9"/>
    <path d="M80 340h480" stroke="#E2F343" stroke-width="3"/>
    <!-- monitor -->
    <rect x="180" y="120" width="280" height="180" rx="14" fill="url(#gInk)"/>
    <rect x="196" y="136" width="248" height="140" rx="8" fill="#FAFBFC"/>
    <rect x="210" y="152" width="90" height="10" rx="5" fill="#E2F343"/>
    <rect x="210" y="174" width="160" height="7" rx="3.5" fill="#E8ECEF"/>
    <rect x="210" y="190" width="140" height="7" rx="3.5" fill="#E8ECEF"/>
    <rect x="210" y="220" width="70" height="28" rx="14" fill="#1D141F"/>
    <rect x="226" y="230" width="38" height="6" rx="3" fill="#E2F343"/>
    <!-- stand -->
    <rect x="300" y="300" width="40" height="40" fill="#1D141F"/>
    <rect x="260" y="330" width="120" height="12" rx="4" fill="#5C6470"/>
    <!-- floating cards -->
    <g transform="translate(470 150) rotate(12)">
      <rect width="110" height="80" rx="12" fill="#E2F343"/>
      <rect x="14" y="18" width="60" height="8" rx="4" fill="#1D141F" opacity="0.35"/>
      <rect x="14" y="36" width="82" height="6" rx="3" fill="#1D141F" opacity="0.2"/>
    </g>
    <g transform="translate(70 170) rotate(-10)">
      <rect width="100" height="120" rx="12" fill="#FAFBFC" stroke="#E8ECEF" stroke-width="3"/>
      <circle cx="50" cy="48" r="22" fill="#1D141F"/>
      <rect x="20" y="84" width="60" height="8" rx="4" fill="#E8ECEF"/>
    </g>
    <!-- plant -->
    <ellipse cx="540" cy="330" rx="28" ry="10" fill="#E8ECEF"/>
    <path d="M540 330c-20-40-10-80 0-90 10 10 20 50 0 90Z" fill="#E2F343"/>
    <path d="M540 330c20-35 8-75-6-88" fill="#E2F343" opacity="0.7"/>
  </g>
</svg>
