<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none" role="img" aria-labelledby="t">
  <title id="t">Chaîne d'assemblage newsletter</title>
  <defs>
    <linearGradient id="gPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#EEF2F5"/>
    </linearGradient>
    <linearGradient id="gInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2030"/>
      <stop offset="100%" stop-color="#1D141F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="640" height="480" rx="32"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="640" height="480" fill="url(#gPaper)"/>
    <circle cx="560" cy="-20" r="160" fill="#E2F343" fill-opacity="0.18"/>
    <circle cx="40" cy="460" r="140" fill="#1D141F" fill-opacity="0.07"/>
    <path d="M0 360c80-40 160-20 240 10s160 40 240-10 120-50 160-20v140H0V360Z" fill="#E8ECEF" fill-opacity="0.35"/>

    <!-- conveyor -->
    <rect x="60" y="280" width="520" height="36" rx="18" fill="#1D141F"/>
    <circle cx="100" cy="298" r="22" fill="#5C6470"/>
    <circle cx="540" cy="298" r="22" fill="#5C6470"/>
    <circle cx="100" cy="298" r="10" fill="#E2F343"/>
    <circle cx="540" cy="298" r="10" fill="#E2F343"/>
    <!-- blocks on belt -->
    <g>
      <rect x="150" y="220" width="90" height="70" rx="10" fill="#FAFBFC" stroke="#E8ECEF" stroke-width="3"/>
      <rect x="162" y="236" width="50" height="6" rx="3" fill="#E2F343"/>
      <rect x="162" y="250" width="66" height="5" rx="2.5" fill="#E8ECEF"/>
    </g>
    <g>
      <rect x="270" y="200" width="100" height="88" rx="12" fill="#1D141F"/>
      <path d="M280 240l40 22 40-22" stroke="#E2F343" stroke-width="3"/>
      <rect x="290" y="258" width="60" height="8" rx="4" fill="#E8ECEF" opacity="0.3"/>
    </g>
    <g>
      <rect x="400" y="214" width="96" height="76" rx="12" fill="#E2F343"/>
      <path d="M420 250l20 18 36-36" stroke="#1D141F" stroke-width="5" stroke-linecap="round" fill="none"/>
    </g>
    <!-- robotic arm -->
    <circle cx="320" cy="100" r="18" fill="#1D141F"/>
    <path d="M320 118v50" stroke="#1D141F" stroke-width="14" stroke-linecap="round"/>
    <path d="M320 168l70 40" stroke="#1D141F" stroke-width="12" stroke-linecap="round"/>
    <rect x="378" y="198" width="36" height="24" rx="6" fill="#D95800"/>
    <!-- arcs -->
    <path d="M200 90c40-40 100-40 140 0" stroke="#E2F343" stroke-width="3" stroke-dasharray="8 8" fill="none"/>
  </g>
</svg>
