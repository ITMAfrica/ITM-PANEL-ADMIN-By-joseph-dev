<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none" role="img" aria-labelledby="t">
  <title id="t">Labyrinthe 404</title>
  <defs>
    <linearGradient id="gPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#EEF2F5"/>
    </linearGradient>
    <linearGradient id="gInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2030"/>
      <stop offset="100%" stop-color="#1D141F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="640" height="480" rx="32"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="640" height="480" fill="url(#gPaper)"/>
    <circle cx="560" cy="-20" r="160" fill="#E2F343" fill-opacity="0.18"/>
    <circle cx="40" cy="460" r="140" fill="#1D141F" fill-opacity="0.07"/>
    <path d="M0 360c80-40 160-20 240 10s160 40 240-10 120-50 160-20v140H0V360Z" fill="#E8ECEF" fill-opacity="0.35"/>

    <!-- maze walls -->
    <path d="M80 80h200v40H160v120h120v40H80V80Z" fill="#1D141F"/>
    <path d="M280 80h200v80H360v40h120v160H280V280h80v-40h-80V80Z" fill="#1D141F" opacity="0.9"/>
    <path d="M120 280h120v80H120z" fill="#E8ECEF"/>
    <path d="M400 120h120v40H440v160h80v40H360V280h80V160h-40v-40Z" fill="#5C6470"/>
    <!-- 404 badge -->
    <rect x="200" y="180" width="200" height="100" rx="20" fill="#E2F343"/>
    <text x="300" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="52" font-weight="900" fill="#1D141F">404</text>
    <!-- character -->
    <circle cx="150" cy="340" r="20" fill="#E2F343"/>
    <path d="M130 390c8-30 14-40 20-40s12 10 20 40" fill="#E2F343"/>
    <path d="M170 340c40-10 80 0 110 20" stroke="#D95800" stroke-width="4" stroke-dasharray="6 6" fill="none"/>
  </g>
</svg>
