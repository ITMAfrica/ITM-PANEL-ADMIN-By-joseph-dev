<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none" role="img" aria-labelledby="t">
  <title id="t">Espace de travail orbital</title>
  <defs>
    <linearGradient id="gPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#EEF2F5"/>
    </linearGradient>
    <linearGradient id="gInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2030"/>
      <stop offset="100%" stop-color="#1D141F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="640" height="480" rx="32"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="640" height="480" fill="url(#gPaper)"/>
    <circle cx="560" cy="-20" r="160" fill="#E2F343" fill-opacity="0.18"/>
    <circle cx="40" cy="460" r="140" fill="#1D141F" fill-opacity="0.07"/>
    <path d="M0 360c80-40 160-20 240 10s160 40 240-10 120-50 160-20v140H0V360Z" fill="#E8ECEF" fill-opacity="0.35"/>

    <ellipse cx="320" cy="240" rx="220" ry="90" fill="none" stroke="#E8ECEF" stroke-width="3" stroke-dasharray="10 12"/>
    <ellipse cx="320" cy="240" rx="150" ry="60" fill="none" stroke="#1D141F" stroke-width="2" opacity="0.35"/>
    <circle cx="320" cy="240" r="48" fill="url(#gInk)"/>
    <circle cx="320" cy="240" r="22" fill="#E2F343"/>
    <!-- satellites -->
    <g transform="translate(140 200)">
      <rect width="70" height="54" rx="12" fill="#FAFBFC" stroke="#E8ECEF" stroke-width="3"/>
      <rect x="12" y="14" width="36" height="6" rx="3" fill="#1D141F"/>
      <rect x="12" y="28" width="46" height="5" rx="2.5" fill="#E8ECEF"/>
    </g>
    <g transform="translate(450 180)">
      <circle r="34" fill="#E2F343"/>
      <path d="M-10 0h20M0-10v20" stroke="#1D141F" stroke-width="4" stroke-linecap="round"/>
    </g>
    <g transform="translate(380 300)">
      <rect x="-32" y="-24" width="64" height="48" rx="10" fill="#D95800"/>
      <rect x="-18" y="-8" width="36" height="6" rx="3" fill="#FAFBFC" opacity="0.7"/>
    </g>
    <g transform="translate(210 300)">
      <path d="M0-28l22 48H-22L0-28Z" fill="#1D141F"/>
      <circle cy="8" r="8" fill="#E2F343"/>
    </g>
    <!-- connecting dots -->
    <circle cx="220" cy="210" r="5" fill="#E2F343"/>
    <circle cx="420" cy="210" r="5" fill="#1D141F"/>
    <path d="M250 220C280 180 360 180 390 220" stroke="#E2F343" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
</svg>
