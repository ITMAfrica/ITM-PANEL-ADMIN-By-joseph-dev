<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none" role="img" aria-labelledby="t">
  <title id="t">Galerie média profonde</title>
  <defs>
    <linearGradient id="gPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#EEF2F5"/>
    </linearGradient>
    <linearGradient id="gInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2030"/>
      <stop offset="100%" stop-color="#1D141F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="640" height="480" rx="32"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="640" height="480" fill="url(#gPaper)"/>
    <circle cx="560" cy="-20" r="160" fill="#E2F343" fill-opacity="0.18"/>
    <circle cx="40" cy="460" r="140" fill="#1D141F" fill-opacity="0.07"/>
    <path d="M0 360c80-40 160-20 240 10s160 40 240-10 120-50 160-20v140H0V360Z" fill="#E8ECEF" fill-opacity="0.35"/>

    <circle cx="320" cy="230" r="120" fill="#1D141F" opacity="0.08"/>
    <!-- polaroid stack -->
    <g transform="translate(200 140) rotate(-14)">
      <rect width="150" height="170" rx="10" fill="#FAFBFC" stroke="#E8ECEF" stroke-width="3"/>
      <rect x="14" y="14" width="122" height="100" rx="6" fill="#1D141F"/>
      <circle cx="50" cy="50" r="16" fill="#E2F343"/>
      <path d="M20 95l35-30 28 22 20-18 33 26H20Z" fill="#E8ECEF" opacity="0.35"/>
    </g>
    <g transform="translate(300 130) rotate(8)">
      <rect width="150" height="170" rx="10" fill="#FAFBFC" stroke="#E8ECEF" stroke-width="3"/>
      <rect x="14" y="14" width="122" height="100" rx="6" fill="#5C6470"/>
      <rect x="30" y="130" width="70" height="8" rx="4" fill="#1D141F" opacity="0.25"/>
    </g>
    <g transform="translate(250 160) rotate(-2)">
      <rect width="160" height="180" rx="12" fill="#FAFBFC" stroke="#1D141F" stroke-width="3"/>
      <rect x="16" y="16" width="128" height="110" rx="8" fill="url(#gInk)"/>
      <circle cx="56" cy="56" r="18" fill="#E2F343"/>
      <path d="M24 110l40-40 30 28 22-24 40 36H24Z" fill="#E8ECEF" opacity="0.25"/>
      <rect x="32" y="142" width="80" height="8" rx="4" fill="#E2F343"/>
    </g>
    <!-- orbit sparks -->
    <circle cx="140" cy="120" r="8" fill="#E2F343"/>
    <circle cx="520" cy="160" r="6" fill="#D95800"/>
    <circle cx="480" cy="340" r="10" fill="#1D141F"/>
    <path d="M150 130c80-60 280-80 360 20" stroke="#E8ECEF" stroke-width="2" stroke-dasharray="6 8" fill="none"/>
  </g>
</svg>
