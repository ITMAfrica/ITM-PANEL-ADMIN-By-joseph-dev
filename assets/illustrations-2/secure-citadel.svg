<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none" role="img" aria-labelledby="t">
  <title id="t">Citadelle sécurisée</title>
  <defs>
    <linearGradient id="gPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#EEF2F5"/>
    </linearGradient>
    <linearGradient id="gInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2030"/>
      <stop offset="100%" stop-color="#1D141F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="640" height="480" rx="32"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="640" height="480" fill="url(#gPaper)"/>
    <circle cx="560" cy="-20" r="160" fill="#E2F343" fill-opacity="0.18"/>
    <circle cx="40" cy="460" r="140" fill="#1D141F" fill-opacity="0.07"/>
    <path d="M0 360c80-40 160-20 240 10s160 40 240-10 120-50 160-20v140H0V360Z" fill="#E8ECEF" fill-opacity="0.35"/>

    <!-- walls -->
    <path d="M80 320h480v40H80Z" fill="#1D141F"/>
    <path d="M120 200h80v120H120Z" fill="#5C6470"/>
    <path d="M440 180h80v140H440Z" fill="#5C6470"/>
    <path d="M220 140h200v180H220Z" fill="url(#gInk)"/>
    <!-- battlements -->
    <rect x="230" y="120" width="24" height="28" rx="3" fill="#1D141F"/>
    <rect x="266" y="120" width="24" height="28" rx="3" fill="#1D141F"/>
    <rect x="302" y="120" width="24" height="28" rx="3" fill="#1D141F"/>
    <rect x="338" y="120" width="24" height="28" rx="3" fill="#1D141F"/>
    <rect x="374" y="120" width="24" height="28" rx="3" fill="#1D141F"/>
    <!-- gate -->
    <path d="M290 320V240c0-30 20-50 30-50s30 20 30 50v80" fill="#E2F343"/>
    <circle cx="320" cy="270" r="8" fill="#1D141F"/>
    <!-- shield badge -->
    <path d="M320 60l50 18v30c0 28-20 46-50 58-30-12-50-30-50-58V78l50-18Z" fill="#E2F343"/>
    <path d="M300 95l14 14 26-28" stroke="#1D141F" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- locks floating -->
    <rect x="100" y="140" width="40" height="36" rx="8" fill="#D95800"/>
    <path d="M110 140v-12a10 10 0 0 1 20 0v12" stroke="#D95800" stroke-width="6" fill="none"/>
    <rect x="500" y="150" width="40" height="36" rx="8" fill="#E2F343"/>
    <path d="M510 150v-12a10 10 0 0 1 20 0v12" stroke="#E2F343" stroke-width="6" fill="none"/>
  </g>
</svg>
