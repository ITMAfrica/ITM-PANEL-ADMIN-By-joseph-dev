<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none" role="img" aria-labelledby="t">
  <title id="t">Cathédrale vide (empty state)</title>
  <defs>
    <linearGradient id="gPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#EEF2F5"/>
    </linearGradient>
    <linearGradient id="gInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2030"/>
      <stop offset="100%" stop-color="#1D141F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="640" height="480" rx="32"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="640" height="480" fill="url(#gPaper)"/>
    <circle cx="560" cy="-20" r="160" fill="#E2F343" fill-opacity="0.18"/>
    <circle cx="40" cy="460" r="140" fill="#1D141F" fill-opacity="0.07"/>
    <path d="M0 360c80-40 160-20 240 10s160 40 240-10 120-50 160-20v140H0V360Z" fill="#E8ECEF" fill-opacity="0.35"/>

    <!-- vault -->
    <path d="M100 360V180c0-80 60-130 220-130s220 50 220 130v180" fill="none" stroke="#E8ECEF" stroke-width="8"/>
    <path d="M160 360V200c0-50 40-90 160-90s160 40 160 90v160" fill="none" stroke="#1D141F" stroke-width="5"/>
    <!-- empty pedestal -->
    <ellipse cx="320" cy="340" rx="90" ry="18" fill="#E8ECEF"/>
    <rect x="250" y="280" width="140" height="60" rx="10" fill="#1D141F"/>
    <rect x="270" y="250" width="100" height="36" rx="8" fill="#5C6470"/>
    <!-- ghost outline -->
    <circle cx="320" cy="180" r="36" fill="none" stroke="#E2F343" stroke-width="4" stroke-dasharray="8 8"/>
    <path d="M280 230c10-30 25-40 40-40s30 10 40 40" fill="none" stroke="#E2F343" stroke-width="4" stroke-dasharray="8 8"/>
    <text x="320" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#8B939E">Rien ici pour le moment</text>
  </g>
</svg>
