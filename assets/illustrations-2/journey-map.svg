<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none" role="img" aria-labelledby="t">
  <title id="t">Carte de parcours</title>
  <defs>
    <linearGradient id="gPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#EEF2F5"/>
    </linearGradient>
    <linearGradient id="gInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2030"/>
      <stop offset="100%" stop-color="#1D141F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="640" height="480" rx="32"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="640" height="480" fill="url(#gPaper)"/>
    <circle cx="560" cy="-20" r="160" fill="#E2F343" fill-opacity="0.18"/>
    <circle cx="40" cy="460" r="140" fill="#1D141F" fill-opacity="0.07"/>
    <path d="M0 360c80-40 160-20 240 10s160 40 240-10 120-50 160-20v140H0V360Z" fill="#E8ECEF" fill-opacity="0.35"/>

    <path d="M80 340C160 280 180 200 240 180s100 40 140 20 60-100 140-90 80 60 100 100" stroke="#1D141F" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M80 340C160 280 180 200 240 180s100 40 140 20 60-100 140-90 80 60 100 100" stroke="#E2F343" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="14 16"/>
    <!-- milestones -->
    
    <circle cx="80" cy="340" r="28" fill="#FAFBFC" stroke="#1D141F" stroke-width="4"/>
    <text x="80" y="346" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#1D141F">1</text>
    <circle cx="240" cy="180" r="28" fill="#FAFBFC" stroke="#1D141F" stroke-width="4"/>
    <text x="240" y="186" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#1D141F">2</text>
    <circle cx="380" cy="200" r="28" fill="#FAFBFC" stroke="#1D141F" stroke-width="4"/>
    <text x="380" y="206" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#1D141F">3</text>
    <circle cx="520" cy="150" r="28" fill="#FAFBFC" stroke="#1D141F" stroke-width="4"/>
    <text x="520" y="156" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#1D141F">4</text>
    <circle cx="580" cy="250" r="28" fill="#E2F343" stroke="#1D141F" stroke-width="4"/>
    <text x="580" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#1D141F">5</text>
    <!-- landmark cards -->
    <g transform="translate(250 70)">
      <rect width="120" height="70" rx="12" fill="#1D141F"/>
      <rect x="16" y="18" width="60" height="8" rx="4" fill="#E2F343"/>
      <rect x="16" y="36" width="88" height="6" rx="3" fill="#E8ECEF" opacity="0.3"/>
    </g>
  </g>
</svg>
